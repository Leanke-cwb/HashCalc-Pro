name: Gerar HashCalc Pro Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 python-docx pyinstaller

      - name: Criar executável
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "HashCalc Pro" `
            --icon icone.icns `
            --hidden-import hash_utils `
            --hidden-import certidao_hash `
            main.py

      - name: Salvar EXE
        uses: actions/upload-artifact@v4
        with:
          name: HashCalc-Pro-Windows
          path: dist/HashCalc Pro.exe
